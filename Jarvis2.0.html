<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANSHPLAYX AI</title>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>

*{
box-sizing:border-box;
}

html,body{

margin:0;
height:100%;
width:100%;
overflow:hidden;

}


body{

background:#101010;
color:white;
font-family:Arial,sans-serif;

display:flex;
flex-direction:column;

}



.header{

height:60px;

display:flex;

align-items:center;

justify-content:center;

font-size:24px;

font-weight:bold;

background:#181818;

flex-shrink:0;

}



#chat{

flex:1;

overflow-y:auto;

padding:15px;

display:flex;

flex-direction:column;

}



.msg{

max-width:75%;

padding:14px 18px;

margin:8px 0;

border-radius:25px;

font-size:16px;

line-height:1.4;

word-wrap:break-word;

}



.user{

background:#2979ff;

align-self:flex-end;

border-bottom-right-radius:5px;

}



.ai{

background:#303030;

align-self:flex-start;

border-bottom-left-radius:5px;

}



.bar{

display:flex;

gap:8px;

padding:10px;

background:#181818;

}



input{

flex:1;

height:52px;

border-radius:30px;

border:none;

outline:none;

background:#252525;

color:white;

padding:0 20px;

font-size:16px;

}



button{

height:52px;

width:52px;

border-radius:50%;

border:none;

color:white;

font-size:20px;

display:flex;

align-items:center;

justify-content:center;

}



#send{

background:#2979ff;

}


#mic{

background:#00c878;

}





@media(max-width:600px){

.msg{

max-width:88%;

}


.header{

font-size:20px;

}


button{

width:48px;

height:48px;

}

}



@media(min-width:900px){

#chat{

width:70%;

margin:auto;

}


.bar{

width:70%;

margin:auto;

}

}


</style>


</head>


<body>


<div class="header">

<i class="fa-solid fa-robot"></i>
&nbsp; ANSHPLAYX AI

</div>



<div id="chat"></div>



<div class="bar">


<input id="input"
placeholder="Message...">



<button id="send">

<i class="fa-solid fa-paper-plane"></i>

</button>



<button id="mic">

<i class="fa-solid fa-microphone"></i>

</button>


</div>



<script>


const API_KEY="AQ.Ab8RN6JLSZCMR1iJXeu-L8lIdXpdtBCVdCCbub8oNJ4za9xzWQ";


const chat=document.getElementById("chat");

const input=document.getElementById("input");

const send=document.getElementById("send");

const mic=document.getElementById("mic");




function addMessage(text,type){


let div=document.createElement("div");


div.className="msg "+type;


div.innerText=text;


chat.appendChild(div);


chat.scrollTop=chat.scrollHeight;


}




addMessage(
"Hello!\nI am ANSHPLAYX AI Assistant.\nCreated by ANSHPLAYX (AYUSH).",
"ai"
);





async function askAI(question){


let prompt =

`You are ANSHPLAYX AI Assistant.

Creator:
ANSHPLAYX (AYUSH)

All credits belong to ANSHPLAYX (AYUSH).

Do not say created by AIDE, Google, ChatGPT or OpenAI.

User:
${question}`;



try{


let res=await fetch(

"https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key="
+API_KEY,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{

parts:[{

text:prompt

}]

}]

})

});


let data=await res.json();


let reply=

data.candidates[0]
.content.parts[0]
.text
.replace(/\*/g,"");



addMessage(reply,"ai");


let voice =
new SpeechSynthesisUtterance(reply);


speechSynthesis.speak(voice);



}

catch(e){

addMessage(
"API Error",
"ai"
);

}



}





send.onclick=function(){


let text=input.value.trim();


if(text!=""){


addMessage(text,"user");


input.value="";


askAI(text);


}


};






let SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;



if(SpeechRecognition){


let recognition =
new SpeechRecognition();


recognition.lang="en-US";



mic.onclick=function(){

recognition.start();

};



recognition.onresult=function(e){


let text =
e.results[0][0].transcript;


addMessage(text,"user");


askAI(text);


};



}
else{


mic.onclick=function(){

addMessage(
"Voice not supported",
"ai"
);

};


}



</script>


</body>
</html>
